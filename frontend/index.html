<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamVault | YouTube Downloader</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <div class="blob"></div>
    <div class="blob2"></div>

    <div class="container">
        <div class="card">
            <div class="logo">
                <i data-lucide="download-cloud"></i>
            </div>
            <h1>Stream<span>Vault</span></h1>
            <p>Download your favorite videos instantly</p>

            <div class="input-group">
                <i data-lucide="link-2"></i>
                <input 
                    type="text" 
                    id="urlInput" 
                    placeholder="Paste YouTube URL here..."
                    autocomplete="off"
                    oninput="handleUrlChange()"
                />
            </div>

            <!-- Preview Card (Hidden initially) -->
            <div id="previewCard" class="preview-card hidden">
                <div class="thumbnail-wrapper">
                    <img id="videoThumbnail" src="" alt="Thumbnail">
                    <span id="videoDuration" class="duration-badge">0:00</span>
                </div>
                <div class="video-details">
                    <h3 id="videoTitle">Video Title</h3>
                    <p id="videoAuthor">Channel Name</p>
                </div>
            </div>

            <div id="qualitySelection" class="quality-selection hidden">
                <label for="formatSelect">Select Quality</label>
                <select id="formatSelect">
                    <option value="best">Best Quality (Default)</option>
                </select>
            </div>

            <button id="downloadBtn" onclick="downloadVideo()">
                <span class="btn-text">Download Now</span>
                <i data-lucide="arrow-right"></i>
            </button>

            <div id="statusMessage" class="status-message"></div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Initialize icons
        lucide.createIcons();
    </script>
</body>
</html>
